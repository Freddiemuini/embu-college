{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="card card-max-400">
            <div class="card-content">
                <h2>Admin Login</h2>
                <form method="POST">
                    <div class="form-group"><label for="admin-username">Username</label><input type="text" id="admin-username" name="username" placeholder="Username" required></div>
                    <div class="form-group"><label for="admin-password">Password</label><input type="password" id="admin-password" name="password" placeholder="Password" required></div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <p class="mt-1">Demo: admin / admin123</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
