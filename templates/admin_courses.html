{% extends "base.html" %}
{% block title %}Manage Courses{% endblock %}
{% block content %}
<section class="admin-section-padding">
    <div class="container">
        <h2>Manage Courses</h2>
        <form method="POST" class="mb-2">
            <div class="form-group"><label for="course-name">Course Name</label><input type="text" id="course-name" name="name" placeholder="Course Name" required></div>
            <div class="form-group"><label for="course-category">Category</label><input type="text" id="course-category" name="category" placeholder="Category" required></div>
            <div class="form-group"><label for="course-duration">Duration</label><input type="text" id="course-duration" name="duration" placeholder="Duration" required></div>
            <div class="form-group"><label for="course-fee">Fee</label><input type="number" id="course-fee" name="fee" placeholder="Fee" required></div>
            <div class="form-group"><label for="course-description">Description</label><textarea id="course-description" name="description" placeholder="Description"></textarea></div>
            <button type="submit" class="btn btn-primary">Add Course</button>
        </form>
        <div class="grid">
            {% for course in courses %}
            <div class="card"><div class="card-content"><h3>{{ course.name }}</h3><p>{{ course.category }} | {{ course.duration }}</p><p>KES {{ course.fee }}</p><a href="{{ url_for('admin_courses_delete', course_id=course.id) }}" onclick="return confirm('Delete?')" class="btn btn-outline">Delete</a></div></div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
