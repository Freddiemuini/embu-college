{% extends "base.html" %}
{% block title %}Manage Gallery{% endblock %}
{% block content %}
<section class="admin-section-padding">
    <div class="container">
        <h2>Manage Gallery</h2>
        <form method="POST">
            <div class="form-group"><label for="gallery-title">Image Title</label><input type="text" id="gallery-title" name="title" placeholder="Image Title" required></div>
            <div class="form-group"><label for="gallery-image">Image URL</label><input type="url" id="gallery-image" name="image" placeholder="Image URL" required class="form-control"></div>
            <button type="submit" class="btn btn-primary">Add Image</button>
        </form>
        <div class="grid mt-2">
            {% for img in gallery_items %}
            <div class="card admin-gallery-item">
                <div class="admin-gallery-image" style="background-image: url(&quot;{{ img.image if img.image else 'https://images.pexels.com/photos/256381/pexels-photo-256381.jpeg?auto=compress&cs=tinysrgb&w=1100' }}&quot;)"></div>
                <div class="card-content"><p>{{ img.title }}</p></div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
